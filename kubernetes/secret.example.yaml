# =============================================================
# SECRET — Credenciais do banco de dados (DBaaS Magalu Cloud)
# -------------------------------------------------------------
# Guarda usuario, senha e host do PostgreSQL FORA do codigo e
# FORA da imagem. O Deployment consome esses valores como
# variaveis de ambiente (envFrom), exatamente como o app.py
# espera (DB_USER, DB_PASSWORD, DB_HOST, DB_PORT, DB_NAME).
#
# IMPORTANTE (seguranca):
#   - Este arquivo usa PLACEHOLDERS. NUNCA commite credenciais
#     reais aqui. No grande final, os valores reais entram de
#     um dos dois jeitos:
#       a) editar este arquivo LOCALMENTE (sem commitar), ou
#       b) criar o secret por linha de comando:
#          kubectl create secret generic ecommerce-db-secret \
#            --from-literal=DB_USER=... \
#            --from-literal=DB_PASSWORD=... \
#            --from-literal=DB_HOST=... \
#            --from-literal=DB_PORT=5432 \
#            --from-literal=DB_NAME=...
#
#   - stringData deixa escrever em texto plano (o Kubernetes
#     converte pra base64 sozinho). Mais legivel que 'data'.
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-db-secret
  labels:
    app: ecommerce
type: Opaque
stringData:
  DB_USER: "ecommerce"
  DB_PASSWORD: "ecommerce"
  DB_HOST: "pg-service"        # IP/host interno do DBaaS na Magalu
  DB_PORT: "5432"
  DB_NAME: "ecommerce"
